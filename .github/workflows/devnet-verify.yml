name: Devnet Verification

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  verify-devnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: sudo apt-get install -y zstd jq xxd

      - name: Fetch, build, and verify latest 10 batches
        run: bash .github/fetch_batches.sh
