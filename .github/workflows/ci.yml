name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-and-build-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build and run example
        run: zig build example

      - name: Test
        run: zig build test

  block-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fork: [Osaka, Amsterdam]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download and extract state test fixtures
        run: curl -L https://github.com/ethereum/execution-specs/releases/download/tests-bal%40v7.3.2/fixtures_bal.tar.gz | tar -xz

      - name: Run blockchain tests
        run: zig build blockchain-tests -Doptimize=ReleaseSafe -Dfork=${{ matrix.fork }}

  state-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fork: [Osaka, Amsterdam]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download and extract state test fixtures
        run: curl -L https://github.com/ethereum/execution-specs/releases/download/tests-bal%40v7.3.2/fixtures_bal.tar.gz | tar -xz

      - name: Run state tests
        run: zig build state-tests -Doptimize=ReleaseSafe -Dfork=${{ matrix.fork }}

  zk-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fork: [Amsterdam]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download and extract zkEVM test fixtures
        run: |
          curl -L https://github.com/ethereum/execution-specs/releases/download/tests-zkevm%40v0.4.1/fixtures_zkevm.tar.gz | tar -xz
          mv fixtures zk_fixtures

      - name: Run zkEVM tests
        run: zig build zk-tests -Doptimize=ReleaseSafe -Dfork=${{ matrix.fork }}

  zisk-guest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (rustup)
        uses: dtolnay/rust-toolchain@stable

      - name: Install zisk
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xz-utils jq curl build-essential qemu-system libomp-dev libgmp-dev \
            nlohmann-json3-dev protobuf-compiler uuid-dev libgrpc++-dev \
            libsecp256k1-dev libsodium-dev libpqxx-dev nasm libopenmpi-dev \
            openmpi-bin openmpi-common libclang-dev clang gcc-riscv64-unknown-elf
          curl -L https://raw.githubusercontent.com/0xPolygonHermez/zisk/main/ziskup/install.sh | bash -s -- --cpu --nokey --version 0.18.0
          echo "${XDG_CONFIG_HOME:-$HOME}/.zisk/bin" >> $GITHUB_PATH

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build guest
        run: zig build zisk -Doptimize=ReleaseFast

      - name: Upload guest ELF
        uses: actions/upload-artifact@v4
        with:
          name: zevm-zisk-guest-${{ github.event.pull_request.head.sha || github.sha }}
          path: zig-out/bin/zevm-zisk-guest
          if-no-files-found: error
