name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-and-build-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build and run example
        run: zig build example

      - name: Test
        run: zig build test

  block-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fork: [Osaka, Amsterdam]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download and extract state test fixtures
        run: curl -L https://github.com/ethereum/execution-spec-tests/releases/download/snobal-devnet-6%40v1.1.0/fixtures_snobal-devnet-6.tar.gz | tar -xz

      - name: Run blockchain tests
        run: zig build blockchain-tests -Doptimize=ReleaseSafe -Dfork=${{ matrix.fork }}

  state-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fork: [Osaka, Amsterdam]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Download and extract state test fixtures
        run: curl -L https://github.com/ethereum/execution-spec-tests/releases/download/snobal-devnet-6%40v1.1.0/fixtures_snobal-devnet-6.tar.gz | tar -xz

      - name: Run state tests
        run: zig build state-tests -Doptimize=ReleaseSafe -Dfork=${{ matrix.fork }}
