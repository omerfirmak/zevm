name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MCL build dependencies
        run: sudo apt-get install -y g++ libgmp-dev

      - name: Build MCL
        run: make -C mcl -j$(nproc) MCL_FP_BIT=256 MCL_FR_BIT=256 lib/libmcl.a

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build and run example
        run: zig build example
